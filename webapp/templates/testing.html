<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR Defense — Testing</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <div class="brand">OCR Defense</div>
        <nav class="nav">
          <a class="nav__link" href="/">Render</a>
          <a class="nav__link nav__link--active" href="/testing">Testing</a>
        </nav>
      </div>
    </header>

    <main class="container grid">
      <section class="card">
        <h2>Настройки тестирования</h2>

        <label>Текст</label>
        <textarea id="text" class="textarea" rows="6">Привет мир</textarea>

        <hr class="sep" />

        <h3>Engines</h3>
        <div class="row">
          <label class="inline"><input type="checkbox" class="engine" value="tesseract" checked /> tesseract</label>
          <label class="inline"><input type="checkbox" class="engine" value="trocr" checked /> trocr</label>
          <label class="inline"><input type="checkbox" class="engine" value="donut" checked /> donut</label>
          <label class="inline"><input type="checkbox" class="engine" value="easyocr" checked /> easyocr</label>
          <label class="inline"><input type="checkbox" class="engine" value="paddleocr" /> paddleocr</label>
        </div>
        <p class="hint">Если `paddlepaddle` не установлен, `paddleocr` будет помечен как skipped.</p>

        <hr class="sep" />

        <h3>Render</h3>
        <div class="formgrid">
          <label>Ширина <input id="image_width" type="number" value="800" min="64" /></label>
          <label>Высота <input id="image_height" type="number" value="600" min="64" /></label>
          <label>Поля <input id="margin" type="number" value="10" min="0" /></label>
          <label>Размер шрифта <input id="font_size" type="number" value="22" min="8" /></label>
          <label>DPI <input id="dpi" type="number" value="96" min="50" /></label>
          <label>Цвет текста <input id="text_color" type="color" value="#000000" /></label>
          <label>Цвет фона <input id="background_color" type="color" value="#ffffff" /></label>
          <label class="span2">Путь к шрифту (опционально)
            <input id="font_path" type="text" placeholder="например: fonts/PT_Sans/PTSans-Regular.ttf" />
          </label>
        </div>

        <hr class="sep" />

        <h3>Attack</h3>
        <label>Режим
          <select id="attack">
            <option value="none">none</option>
            <option value="semantic">semantic</option>
            <option value="diacritics">diacritics</option>
            <option value="image_patch">image_patch</option>
            <option value="watermark">watermark</option>
            <option value="distortions">distortions</option>
            <option value="adv_docvqa">adv_docvqa</option>
            <option value="all" selected>all</option>
          </select>
        </label>

        <details class="details" open>
          <summary>Advanced</summary>

          <div class="subcard">
            <div class="row row--between">
              <h3>Semantic</h3>
              <label class="inline"><input id="sem_enabled" type="checkbox" checked /> Включить</label>
            </div>
            <div class="formgrid">
              <label>Language
                <select id="sem_language">
                  <option value="auto" selected>auto</option>
                  <option value="ru">ru</option>
                  <option value="en">en</option>
                </select>
              </label>
              <label>max_changed_words <input id="sem_max_changed_words" type="number" value="3" min="0" /></label>
              <label>population_size <input id="sem_population_size" type="number" value="24" min="2" /></label>
              <label>generations <input id="sem_generations" type="number" value="18" min="0" /></label>
              <label>random_seed <input id="sem_random_seed" type="number" placeholder="(опционально)" /></label>
              <label class="span2">oracle engine (опционально) <input id="sem_oracle_engine" type="text" placeholder="например: tesseract" /></label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Diacritics</h3>
              <label class="inline"><input id="dia_enabled" type="checkbox" checked /> Включить</label>
            </div>
            <div class="formgrid">
              <label>budget_per_word <input id="dia_budget_per_word" type="number" value="5" min="0" /></label>
              <label>probability <input id="dia_probability" type="number" value="0.6" min="0" max="1" step="0.05" /></label>
              <label>random_seed <input id="dia_random_seed" type="number" placeholder="(опционально)" /></label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Image patch</h3>
              <label class="inline"><input id="ip_enabled" type="checkbox" checked /> Включить</label>
            </div>
            <div class="formgrid">
              <label>max_patches_per_line <input id="ip_max_patches_per_line" type="number" value="1" min="0" /></label>
              <label>random_seed <input id="ip_random_seed" type="number" placeholder="(опционально)" /></label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Adv DocVQA</h3>
              <label class="inline"><input id="adv_enabled" type="checkbox" /> Включить</label>
            </div>
            <div class="formgrid">
              <label>model_name
                <select id="adv_model_name">
                  <option value="donut" selected>donut</option>
                  <option value="pix2struct">pix2struct</option>
                </select>
              </label>
              <label class="span2">checkpoint
                <input id="adv_checkpoint" type="text" value="naver-clova-ix/donut-base-finetuned-docvqa" />
              </label>
              <label class="inline">local_files_only <input id="adv_local_files_only" type="checkbox" checked /></label>
              <label>eps <input id="adv_eps" type="number" value="8.0" step="0.1" min="0" /></label>
              <label>steps <input id="adv_steps" type="number" value="20" min="1" /></label>
              <label>step_size <input id="adv_step_size" type="number" value="1.0" step="0.1" min="0" /></label>
              <label>mask
                <select id="adv_mask">
                  <option value="include_all" selected>include_all</option>
                  <option value="exclude_white">exclude_white</option>
                  <option value="bottom_right_corner">bottom_right_corner</option>
                </select>
              </label>
              <label>device
                <select id="adv_device">
                  <option value="cpu" selected>cpu</option>
                  <option value="cuda">cuda</option>
                </select>
              </label>
              <label class="inline">targeted <input id="adv_is_targeted" type="checkbox" checked /></label>
              <label class="span2">questions (через `;`)
                <input id="adv_questions" type="text" placeholder="What is the total?;What is invoice number?" />
              </label>
              <label class="span2">targets (через `;`, для targeted)
                <input id="adv_targets" type="text" placeholder="$0.00;0" />
              </label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Watermark</h3>
              <label class="inline"><input id="wm_enabled" type="checkbox" /> Включить</label>
            </div>
            <div class="formgrid">
              <label class="span2">text lines (через `;`)
                <input id="wm_text_lines" type="text" value="CONFIDENTIAL;OCR DEFENSE" />
              </label>
              <label>color <input id="wm_color" type="color" value="#606060" /></label>
              <label>alpha (0-255) <input id="wm_alpha" type="number" value="80" min="0" max="255" /></label>
              <label>font_size <input id="wm_font_size" type="number" value="24" min="8" /></label>
              <label>x_spacing <input id="wm_x_spacing" type="number" value="160" min="20" /></label>
              <label>y_spacing <input id="wm_y_spacing" type="number" value="120" min="20" /></label>
              <label>angle_deg <input id="wm_angle_deg" type="number" value="-18" step="0.5" /></label>
              <label>x_offset <input id="wm_x_offset" type="number" value="0" /></label>
              <label>y_offset <input id="wm_y_offset" type="number" value="0" /></label>
              <label class="span2">font_path (опционально)
                <input id="wm_font_path" type="text" placeholder="например: fonts/PT_Sans/PTSans-Regular.ttf" />
              </label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Distortions</h3>
              <label class="inline"><input id="dist_enabled" type="checkbox" /> Включить</label>
            </div>
            <div class="formgrid">
              <label class="inline">skew <input id="dist_enable_skew" type="checkbox" checked /></label>
              <label class="inline">rotate <input id="dist_enable_rotate" type="checkbox" checked /></label>
              <label class="inline">warp <input id="dist_enable_warp" type="checkbox" checked /></label>
              <label class="inline">strikethrough <input id="dist_enable_strikethrough" type="checkbox" checked /></label>
              <label>character_distort_probability <input id="dist_char_prob" type="number" value="0.18" min="0" max="1" step="0.01" /></label>
              <label>skew_degrees <input id="dist_skew_degrees" type="number" value="10" min="0" step="0.5" /></label>
              <label>rotate_degrees <input id="dist_rotate_degrees" type="number" value="9" min="0" step="0.5" /></label>
              <label>warp_probability <input id="dist_warp_probability" type="number" value="1.0" min="0" max="1" step="0.01" /></label>
              <label>warp_amplitude <input id="dist_warp_amplitude" type="number" value="2.0" min="0" step="0.2" /></label>
              <label>warp_frequency <input id="dist_warp_frequency" type="number" value="0.06" min="0" step="0.01" /></label>
              <label>strikethrough_probability <input id="dist_strike_probability" type="number" value="0.45" min="0" max="1" step="0.01" /></label>
              <label>strikethrough_width <input id="dist_strike_width" type="number" value="2" min="1" /></label>
              <label>strikethrough_color <input id="dist_strike_color" type="color" value="#202020" /></label>
              <label>random_seed <input id="dist_random_seed" type="number" placeholder="(опционально)" /></label>
            </div>
          </div>
        </details>

        <div class="row">
          <button id="btnRun" class="btn btn--primary">Запустить тестирование</button>
        </div>
      </section>

      <section class="card">
        <h2>Результаты</h2>
        <div id="status" class="hint">Готово.</div>
        <pre id="results" class="pre pre--scroll"></pre>
      </section>
    </main>

    <script src="/static/testing.js"></script>
  </body>
</html>
