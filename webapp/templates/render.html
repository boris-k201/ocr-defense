<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OCR Defense — Render</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="container">
        <div class="brand">OCR Defense</div>
        <nav class="nav">
          <a class="nav__link nav__link--active" href="/">Render</a>
          <a class="nav__link" href="/testing">Testing</a>
        </nav>
      </div>
    </header>

    <main class="container grid">
      <section class="card">
        <h2>Текст</h2>
        <textarea id="text" class="textarea" rows="8">Привет мир</textarea>

        <div class="row">
          <button id="btnRender" class="btn btn--primary">Сгенерировать</button>
          <label class="inline">
            <input id="showMeta" type="checkbox" checked />
            Показать метаданные
          </label>
        </div>

        <hr class="sep" />

        <h2>Параметры рендера</h2>
        <div class="formgrid">
          <label>Ширина <input id="image_width" type="number" value="800" min="64" /></label>
          <label>Высота <input id="image_height" type="number" value="600" min="64" /></label>
          <label>Размер шрифта <input id="font_size" type="number" value="22" min="8" /></label>
          <label>DPI <input id="dpi" type="number" value="96" min="50" /></label>
          <label>Цвет текста <input id="text_color" type="color" value="#000000" /></label>
          <label>Цвет фона <input id="background_color" type="color" value="#ffffff" /></label>
          <label class="span2">Путь к шрифту (опционально)
            <input id="font_path" type="text" placeholder="например: fonts/PT_Sans/PTSans-Regular.ttf" />
          </label>
        </div>

        <hr class="sep" />

        <div class="tabs">
          <button class="tab tab--active" data-tab="basic">Basic</button>
          <button class="tab" data-tab="advanced">Advanced</button>
        </div>

        <div id="tab-basic" class="tabpane tabpane--active">
          <h2>Методы обфускации</h2>
          <label>Режим
            <select id="attack">
              <option value="none" selected>none</option>
              <option value="semantic">semantic</option>
              <option value="diacritics">diacritics</option>
              <option value="image_patch">image_patch</option>
              <option value="all">all</option>
            </select>
          </label>
          <p class="hint">Если включён режим, но соответствующая атака в Advanced выключена — она не применяется.</p>
        </div>

        <div id="tab-advanced" class="tabpane">
          <h2>Advanced настройки</h2>

          <div class="subcard">
            <div class="row row--between">
              <h3>Semantic</h3>
              <label class="inline"><input id="sem_enabled" type="checkbox" /> Включить</label>
            </div>
            <div class="formgrid">
              <label>Language
                <select id="sem_language">
                  <option value="auto" selected>auto</option>
                  <option value="ru">ru</option>
                  <option value="en">en</option>
                </select>
              </label>
              <label>max_changed_words <input id="sem_max_changed_words" type="number" value="3" min="0" /></label>
              <label>population_size <input id="sem_population_size" type="number" value="24" min="2" /></label>
              <label>generations <input id="sem_generations" type="number" value="18" min="0" /></label>
              <label>random_seed <input id="sem_random_seed" type="number" placeholder="(опционально)" /></label>
              <label class="span2">oracle engine (опционально) <input id="sem_oracle_engine" type="text" placeholder="например: tesseract" /></label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Diacritics</h3>
              <label class="inline"><input id="dia_enabled" type="checkbox" /> Включить</label>
            </div>
            <div class="formgrid">
              <label>budget_per_word <input id="dia_budget_per_word" type="number" value="5" min="0" /></label>
              <label>probability <input id="dia_probability" type="number" value="0.6" min="0" max="1" step="0.05" /></label>
              <label>random_seed <input id="dia_random_seed" type="number" placeholder="(опционально)" /></label>
            </div>
          </div>

          <div class="subcard">
            <div class="row row--between">
              <h3>Image patch</h3>
              <label class="inline"><input id="ip_enabled" type="checkbox" /> Включить</label>
            </div>
            <div class="formgrid">
              <label>max_patches_per_line <input id="ip_max_patches_per_line" type="number" value="1" min="0" /></label>
              <label>random_seed <input id="ip_random_seed" type="number" placeholder="(опционально)" /></label>
            </div>
          </div>
        </div>
      </section>

      <section class="card">
        <h2>Результат</h2>
        <div class="preview">
          <img id="previewImg" alt="render result" />
        </div>
        <div id="metaWrap" class="meta">
          <h3>Attacked text</h3>
          <pre id="attackedText" class="pre"></pre>
          <h3>Meta</h3>
          <pre id="attackMeta" class="pre"></pre>
        </div>
      </section>
    </main>

    <script src="/static/render.js"></script>
  </body>
</html>
